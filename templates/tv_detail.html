<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Details • WatchNextAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .detail-actions { display: flex; gap: .75rem; flex-wrap: wrap; }
        .action-btn {
            padding: .6rem 1.2rem; border-radius: 999px;
            border: 1px solid var(--border); background: var(--card);
            color: var(--fg); font-weight: 700; cursor: pointer; transition: all .2s;
        }
        .action-btn:hover { background: var(--accent-soft); }
        .action-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .trailer-block { margin-top: 2rem; }
        .trailer-block h2 { margin: 0 0 .75rem; font-size: 1.2rem; }
        .trailer-block iframe {
            width: 100%; aspect-ratio: 16/9;
            border: 1px solid var(--border); border-radius: var(--radius); background: #000;
        }
        .chatbot-container {
            margin-top: 2rem; padding: 1.5rem;
            background: var(--card); border-radius: 1rem; border: 1px solid var(--border);
        }
        .chatbot-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; font-size: 1.1rem; font-weight: 700; }
        .chat-messages { max-height: 380px; overflow-y: auto; margin-bottom: 1rem; padding: 1rem; background: var(--bg); border-radius: .5rem; }
        .chat-message { margin-bottom: 1rem; padding: .75rem 1rem; border-radius: .75rem; max-width: 80%; }
        .chat-message.user { background: var(--accent); color: white; margin-left: auto; }
        .chat-message.bot { background: var(--card); border: 1px solid var(--border); }
        .chat-input-container { display: flex; gap: .5rem; }
        .chat-input { flex: 1; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: .5rem; color: var(--fg); font-family: inherit; }
        .chat-send-btn { padding: .75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: .5rem; cursor: pointer; font-weight: 700; }
        .chat-send-btn:hover { opacity: .9; }
        .chat-send-btn:disabled { opacity: .5; cursor: not-allowed; }
    </style>
    <script>
        (function(){var t=localStorage.getItem('wn_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
    </script>
</head>
<body>
    <div id="dynamicBg" class="dynamic-bg"></div>
    <nav class="navbar navbar--detail">
        <div class="nav-brand">
            <div class="logo">📺</div>
            <div class="brand-text">
                <div class="brand-title">WatchNextAI</div>
                <div class="brand-subtitle">TV Show details</div>
            </div>
        </div>
        <div class="nav-actions">
            <a class="pill-btn" href="/">← Back</a>
            <span id="authGreeting" class="auth-greeting" style="display:none;"></span>
            <a id="profileBtn" href="/profile" class="pill-btn" style="display:none;">👤 Profile</a>
            <button id="themeToggle" class="pill-btn" type="button">
                <span id="themeIcon">🌙</span>
                <span id="themeLabel">Dark</span>
            </button>
            <button id="authBtn" class="pill-btn" type="button" onclick="openAuthModal()">Sign In</button>
        </div>
    </nav>

    <main class="detail">
        <div id="loading" style="text-align:center;padding:2rem;">Loading TV show details…</div>
        <div id="error" style="display:none;text-align:center;padding:2rem;color:#ef4444;"></div>

        <div id="showContent" style="display:none;">
            <div class="detail-grid">
                <div class="detail-poster">
                    <img id="posterImg" class="poster big" alt="Show poster" />
                </div>
                <div class="detail-info">
                    <div class="detail-header">
                        <h1 id="showTitle" class="detail-title"></h1>
                        <p id="showTagline" class="detail-tagline" style="display:none;"></p>
                    </div>
                    <div id="showStats" class="detail-stats"></div>
                    <p id="showOverview" class="detail-overview"></p>
                    <div class="detail-actions">
                        <button id="watchlistBtn" class="action-btn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                        <button id="watchedBtn" class="action-btn" onclick="markWatched()">✓ Mark as Watched</button>
                    </div>
                </div>
            </div>

            <div class="trailer-block" id="trailerBlock" style="display:none;">
                <h2>🎬 Trailer</h2>
                <iframe id="trailerIframe" src="" title="Show Trailer" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>

            <div class="chatbot-container">
                <div class="chatbot-header"><span>🤖</span><span>Chat about this show</span></div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message bot">Hi! Ask me about the plot, characters, seasons, or get recommendations for similar shows!</div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Ask about the show…"
                        onkeypress="if(event.key==='Enter') sendMessage()" />
                    <button id="chatSendBtn" class="chat-send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
        <div class="modal">
            <button class="modal-close" onclick="closeAuthModal()" aria-label="Close">✕</button>
            <h2 id="authModalTitle">Welcome Back</h2>
            <div class="modal-field" id="nameField" style="display:none;">
                <label for="authName">Name</label>
                <input type="text" id="authName" placeholder="Your name" autocomplete="name" />
            </div>
            <div class="modal-field">
                <label for="authEmail">Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="modal-field">
                <label for="authPassword">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
                    <button class="password-toggle" type="button" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <div id="strengthContainer" style="display:none;" class="strength-container">
                <div class="strength-track"><div id="strengthBar" class="strength-bar"></div></div>
                <span id="strengthLabel" class="strength-label"></span>
            </div>
            <div class="modal-error" id="authError"></div>
            <button class="modal-submit" id="authSubmit" onclick="handleAuthSubmit()">Sign In</button>
            <div class="modal-toggle">
                <span id="authToggleText">Don't have an account?</span>
                <button id="authToggleBtn" onclick="toggleAuthMode()">Sign Up</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.3/dist/umd/supabase.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth-modal.js') }}"></script>
    <script>
        const tvId = {{ tv_id }};
        let showData = null;
        let inWatchlist = false;

        async function toggleWatchlist() {
            const session = await checkAuth();
            if (!session) { window.showToast('Sign in to use watchlist.'); openAuthModal(); return; }
            const btn = document.getElementById('watchlistBtn');
            if (inWatchlist) {
                const r = await removeFromWatchlist(tvId);
                if (r.success) { inWatchlist = false; btn.textContent = '+ Add to Watchlist'; btn.classList.remove('active'); window.showToast('Removed from watchlist.'); }
                else window.showToast(r.error || 'Error.', 'error');
            } else {
                const r = await addToWatchlist(tvId, 'tv', showData?.name, showData?.poster_path);
                if (r.success) { inWatchlist = true; btn.textContent = '✓ In Watchlist'; btn.classList.add('active'); window.showToast('Added to watchlist!'); }
                else window.showToast(r.error || 'Error.', 'error');
            }
        }
        async function markWatched() {
            const session = await checkAuth();
            if (!session) { window.showToast('Sign in to track watched.'); openAuthModal(); return; }
            const r = await markAsWatched(tvId, 'tv', showData?.name, null);
            if (r.success) { document.getElementById('watchedBtn').classList.add('active'); window.showToast('Marked as watched!'); }
            else window.showToast(r.error || 'Error.', 'error');
        }

        async function loadShowDetails() {
            try {
                const res = await fetch(`/api/tv/${tvId}`);
                if (!res.ok) throw new Error();
                showData = await res.json();
                displayShow(showData);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('showContent').style.display = 'block';
                loadTrailer();
            } catch {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load TV show details. Please try again.';
            }
        }

        function setDynamicBg(url) {
            const bg = document.getElementById('dynamicBg');
            if (!bg || !url) return;
            bg.style.backgroundImage = `url('${url}')`;
            const theme = document.documentElement.getAttribute('data-theme') || 'dark';
            if (theme !== 'light') {
                requestAnimationFrame(() => { bg.style.opacity = '1'; });
            }
        }

        function displayShow(show) {
            const posterUrl = show.poster_path
                ? `https://image.tmdb.org/t/p/w780${show.poster_path}`
                : null;
            document.getElementById('posterImg').src = posterUrl || 'https://via.placeholder.com/500x750?text=No+Image';
            document.getElementById('posterImg').alt = show.name;
            setDynamicBg(posterUrl);
            document.getElementById('showTitle').textContent = show.name || 'Untitled';
            if (show.tagline) {
                const tl = document.getElementById('showTagline');
                tl.textContent = show.tagline; tl.style.display = 'block';
            }
            let html = '';
            if (show.vote_average)       html += `<span class="chip">⭐ ${show.vote_average.toFixed(1)}</span>`;
            if (show.first_air_date)     html += `<span class="chip">${show.first_air_date.slice(0,4)}</span>`;
            if (show.number_of_seasons)  html += `<span class="chip">${show.number_of_seasons} Season${show.number_of_seasons>1?'s':''}</span>`;
            if (show.episode_run_time?.length) html += `<span class="chip">~${show.episode_run_time[0]} min/ep</span>`;
            if (show.genres?.length)     html += `<span class="chip">${show.genres.map(g=>g.name).join(', ')}</span>`;
            document.getElementById('showStats').innerHTML = html;
            document.getElementById('showOverview').textContent = show.overview || 'No overview available.';
        }

        async function loadTrailer() {
            try {
                const res = await fetch(`/api/tv/${tvId}/trailer`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.key) {
                    document.getElementById('trailerIframe').src = `https://www.youtube.com/embed/${data.key}`;
                    document.getElementById('trailerBlock').style.display = 'block';
                }
            } catch {}
        }

        async function sendMessage() {
            const input   = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSendBtn');
            const message = input.value.trim();
            if (!message || !showData) return;
            addChatMessage(message, 'user');
            input.value = ''; sendBtn.disabled = true;
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ movie_title: showData.name, movie_overview: showData.overview, message })
                });
                const data = await res.json();
                addChatMessage(data.response || 'No response.', 'bot');
            } catch { addChatMessage('Sorry, an error occurred.', 'bot'); }
            finally { sendBtn.disabled = false; }
        }
        function addChatMessage(text, sender) {
            const c = document.getElementById('chatMessages');
            const d = document.createElement('div');
            d.className = `chat-message ${sender}`; d.textContent = text;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        loadShowDetails();
    </script>
</body>
</html>
