<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Details • WatchNextAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .detail-actions { display: flex; gap: .75rem; flex-wrap: wrap; }
        .action-btn {
            padding: .6rem 1.2rem; border-radius: 999px;
            border: 1px solid var(--border); background: var(--card);
            color: var(--fg); font-weight: 700; cursor: pointer; transition: all .2s;
        }
        .action-btn:hover { background: var(--accent-soft); }
        .action-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .trailer-block { margin-top: 2rem; }
        .trailer-block h2 { margin: 0 0 .75rem; font-size: 1.2rem; }
        .trailer-block iframe {
            width: 100%; aspect-ratio: 16/9;
            border: 1px solid var(--border); border-radius: var(--radius); background: #000;
        }
        .chatbot-container {
            margin-top: 2rem; padding: 1.5rem;
            background: var(--card); border-radius: 1rem; border: 1px solid var(--border);
        }
        .chatbot-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; font-size: 1.1rem; font-weight: 700; }
        .chat-messages { max-height: 380px; overflow-y: auto; margin-bottom: 1rem; padding: 1rem; background: var(--bg); border-radius: .5rem; }
        .chat-message { margin-bottom: 1rem; padding: .75rem 1rem; border-radius: .75rem; max-width: 80%; }
        .chat-message.user { background: var(--accent); color: white; margin-left: auto; }
        .chat-message.bot { background: var(--card); border: 1px solid var(--border); }
        .chat-input-container { display: flex; gap: .5rem; }
        .chat-input { flex: 1; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: .5rem; color: var(--fg); font-family: inherit; }
        .chat-send-btn { padding: .75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: .5rem; cursor: pointer; font-weight: 700; }
        .chat-send-btn:hover { opacity: .9; }
        .chat-send-btn:disabled { opacity: .5; cursor: not-allowed; }
    </style>
    <script>
        // Prevent theme flash
        (function(){var t=localStorage.getItem('wn_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
    </script>
</head>
<body>
    <nav class="navbar navbar--detail">
        <div class="nav-brand">
            <div class="logo">🎬</div>
            <div class="brand-text">
                <div class="brand-title">WatchNextAI</div>
                <div class="brand-subtitle">Movie details</div>
            </div>
        </div>
        <div class="nav-actions">
            <a class="pill-btn" href="/">← Back</a>
            <button id="themeToggle" class="pill-btn" type="button">
                <span id="themeIcon">🌙</span>
                <span id="themeLabel">Dark</span>
            </button>
            <button id="authBtn" class="pill-btn" type="button">Sign In</button>
        </div>
    </nav>

    <main class="detail">
        <div id="loading" style="text-align:center;padding:2rem;">Loading movie details…</div>
        <div id="error" style="display:none;text-align:center;padding:2rem;color:#ef4444;"></div>

        <div id="movieContent" style="display:none;">
            <div class="detail-grid">
                <div class="detail-poster">
                    <img id="posterImg" class="poster big" alt="Movie poster" />
                </div>
                <div class="detail-info">
                    <div class="detail-header">
                        <h1 id="movieTitle" class="detail-title"></h1>
                        <p id="movieTagline" class="detail-tagline" style="display:none;"></p>
                    </div>
                    <div id="movieStats" class="detail-stats"></div>
                    <p id="movieOverview" class="detail-overview"></p>
                    <div class="detail-actions">
                        <button id="watchlistBtn" class="action-btn" onclick="toggleWatchlist()">+ Add to Watchlist</button>
                        <button id="watchedBtn" class="action-btn" onclick="markWatched()">✓ Mark as Watched</button>
                    </div>
                </div>
            </div>

            <div class="trailer-block" id="trailerBlock" style="display:none;">
                <h2>🎬 Trailer</h2>
                <iframe id="trailerIframe" src="" title="Movie Trailer" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>

            <div class="chatbot-container">
                <div class="chatbot-header"><span>🤖</span><span>Chat about this movie</span></div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message bot">Hi! Ask me anything about the plot, characters, themes, or get recommendations for similar movies!</div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Ask about the movie…"
                        onkeypress="if(event.key==='Enter') sendMessage()" />
                    <button id="chatSendBtn" class="chat-send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
        <div class="modal">
            <button class="modal-close" onclick="closeAuthModal()" aria-label="Close">✕</button>
            <h2 id="authModalTitle">Welcome Back</h2>
            <div class="modal-field">
                <label for="authEmail">Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="modal-field">
                <label for="authPassword">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" />
                    <button class="password-toggle" type="button" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <div id="strengthContainer" style="display:none;" class="strength-container">
                <div class="strength-track"><div id="strengthBar" class="strength-bar"></div></div>
                <span id="strengthLabel" class="strength-label"></span>
            </div>
            <div class="modal-error" id="authError"></div>
            <button class="modal-submit" id="authSubmit" onclick="handleAuthSubmit()">Sign In</button>
            <div class="modal-toggle">
                <span id="authToggleText">Don't have an account?</span>
                <button id="authToggleBtn" onclick="toggleAuthMode()">Sign Up</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth-modal.js') }}"></script>
    <script>
        const movieId = {{ movie_id }};
        let movieData = null;
        let inWatchlist = false;

        async function toggleWatchlist() {
            const session = await checkAuth();
            if (!session) { window.showToast('Sign in to use watchlist.'); openAuthModal(); return; }
            const btn = document.getElementById('watchlistBtn');
            if (inWatchlist) {
                const r = await removeFromWatchlist(movieId);
                if (r.success) { inWatchlist = false; btn.textContent = '+ Add to Watchlist'; btn.classList.remove('active'); window.showToast('Removed from watchlist.'); }
                else window.showToast(r.error || 'Error.', 'error');
            } else {
                const r = await addToWatchlist(movieId, 'movie', movieData?.title, movieData?.poster_path);
                if (r.success) { inWatchlist = true; btn.textContent = '✓ In Watchlist'; btn.classList.add('active'); window.showToast('Added to watchlist!'); }
                else window.showToast(r.error || 'Error.', 'error');
            }
        }
        async function markWatched() {
            const session = await checkAuth();
            if (!session) { window.showToast('Sign in to track watched.'); openAuthModal(); return; }
            const r = await markAsWatched(movieId, 'movie', movieData?.title, null);
            if (r.success) { document.getElementById('watchedBtn').classList.add('active'); window.showToast('Marked as watched!'); }
            else window.showToast(r.error || 'Error.', 'error');
        }

        async function loadMovieDetails() {
            try {
                const res = await fetch(`/api/movie/${movieId}`);
                if (!res.ok) throw new Error();
                movieData = await res.json();
                displayMovie(movieData);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('movieContent').style.display = 'block';
                loadTrailer();
            } catch {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load movie details. Please try again.';
            }
        }

        function displayMovie(movie) {
            document.getElementById('posterImg').src = movie.poster_path
                ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
                : 'https://via.placeholder.com/500x750?text=No+Image';
            document.getElementById('posterImg').alt = movie.title;
            document.getElementById('movieTitle').textContent = movie.title || 'Untitled';
            if (movie.tagline) {
                const tl = document.getElementById('movieTagline');
                tl.textContent = movie.tagline; tl.style.display = 'block';
            }
            let html = '';
            if (movie.vote_average) html += `<span class="chip">⭐ ${movie.vote_average.toFixed(1)}</span>`;
            if (movie.release_date) html += `<span class="chip">${movie.release_date}</span>`;
            if (movie.runtime)      html += `<span class="chip">${movie.runtime} min</span>`;
            if (movie.genres?.length) html += `<span class="chip">${movie.genres.map(g=>g.name).join(', ')}</span>`;
            document.getElementById('movieStats').innerHTML = html;
            document.getElementById('movieOverview').textContent = movie.overview || 'No overview available.';
        }

        async function loadTrailer() {
            try {
                const res = await fetch(`/api/movie/${movieId}/trailer`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.key) {
                    document.getElementById('trailerIframe').src = `https://www.youtube.com/embed/${data.key}`;
                    document.getElementById('trailerBlock').style.display = 'block';
                }
            } catch {}
        }

        async function sendMessage() {
            const input   = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSendBtn');
            const message = input.value.trim();
            if (!message || !movieData) return;
            addChatMessage(message, 'user');
            input.value = ''; sendBtn.disabled = true;
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ movie_title: movieData.title, movie_overview: movieData.overview, message })
                });
                const data = await res.json();
                addChatMessage(data.response || 'No response.', 'bot');
            } catch { addChatMessage('Sorry, an error occurred.', 'bot'); }
            finally { sendBtn.disabled = false; }
        }
        function addChatMessage(text, sender) {
            const c = document.getElementById('chatMessages');
            const d = document.createElement('div');
            d.className = `chat-message ${sender}`; d.textContent = text;
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }

        loadMovieDetails();
    </script>
</body>
</html>
